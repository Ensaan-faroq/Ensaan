<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المسؤول - Ensaan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: white; padding: 20px; border-radius: 16px; flex: 1; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .stat-number { font-size: 2em; font-weight: bold; color: #e74c3c; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: #ecf0f1; border: none; padding: 12px 24px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #3498db; color: white; }
        .tab-content { display: none; background: white; border-radius: 24px; padding: 25px; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #2c3e50; color: white; }
        .ban-btn, .delete-btn, .add-btn { border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; margin: 2px; }
        .ban-btn { background: #e74c3c; color: white; }
        .delete-btn { background: #c0392b; color: white; }
        .add-btn { background: #27ae60; color: white; padding: 10px 20px; margin-top: 20px; }
        .search-input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 12px; border: 2px solid #ddd; }
        .logout-btn { background: #e74c3c; color: white; padding: 10px 20px; border-radius: 50px; text-decoration: none; }
        .role-badge { padding: 4px 12px; border-radius: 50px; font-size: 12px; }
        .role-super { background: #e74c3c; color: white; }
        .role-admin { background: #f39c12; color: white; }
        .role-viewer { background: #3498db; color: white; }
        .hidden { display: none; }
        .verified-yes { color: green; font-weight: bold; }
        .verified-no { color: red; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>👑 لوحة تحكم Ensaan</h1>
        <div><span id="adminInfo"></span> <a href="admin-login.html" class="logout-btn" onclick="localStorage.clear()">🚪 خروج</a></div>
    </div>
    <div class="stats">
        <div class="stat-card">🟢 المتبرعون <div class="stat-number" id="totalDonors">0</div></div>
        <div class="stat-card">🔴 المحتاجون <div class="stat-number" id="totalSeekers">0</div></div>
        <div class="stat-card">🩸 طلبات الدم <div class="stat-number" id="totalRequests">0</div></div>
        <div class="stat-card">💬 دردشات نشطة <div class="stat-number" id="activeChats">0</div></div>
    </div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="users">👥 المستخدمون</button>
        <button class="tab-btn" data-tab="requests">🩸 طلبات الدم</button>
        <button class="tab-btn" data-tab="donations">🏆 عمليات التبرع</button>
        <button class="tab-btn" data-tab="admins">👑 المسؤولون</button>
    </div>
    <div id="usersTab" class="tab-content active">
        <input type="text" id="searchUsers" class="search-input" placeholder="🔍 بحث بالاسم أو الهاتف">
        <div style="overflow-x:auto;"><table><thead><tr><th>الاسم</th><th>الهاتف</th><th>فصيلة الدم</th><th>النوع</th><th>التحقق</th><th>النقاط</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody id="usersTableBody"></tbody></table></div>
    </div>
    <div id="requestsTab" class="tab-content">
        <div style="overflow-x:auto;"><table><thead><tr><th>المحتاج</th><th>الفصيلة</th><th>الموقع</th><th>الوقت</th><th>الحالة</th><th>المتبرع</th><th>إجراءات</th></tr></thead><tbody id="requestsTableBody"></tbody></table></div>
    </div>
    <div id="donationsTab" class="tab-content">
        <div style="overflow-x:auto;"><table><thead><tr><th>المتبرع</th><th>المحتاج</th><th>الكود</th><th>النقاط</th><th>التاريخ</th></tr></thead><tbody id="donationsTableBody"></tbody></table></div>
    </div>
    <div id="adminsTab" class="tab-content">
        <div id="addAdminSection" class="hidden"><h3>➕ إضافة مسؤول جديد</h3><input type="text" id="newUsername" placeholder="اسم المستخدم"><input type="password" id="newPassword" placeholder="كلمة السر"><select id="newRole"><option value="admin">مشرف</option><option value="viewer">مراقب</option></select><input type="text" id="newFullName" placeholder="الاسم الكامل"><button class="add-btn" onclick="addNewAdmin()">إضافة</button></div>
        <table><thead><tr><th>الاسم</th><th>المستخدم</th><th>الدور</th><th>إجراءات</th></tr></thead><tbody id="adminsTableBody"></tbody></table>
    </div>
</div>
<script src="admin-dashboard.js"></script>
</body>
</html>
